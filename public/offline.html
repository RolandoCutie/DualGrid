<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CubaWay — Offline</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Helvetica Neue', Arial;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #f9fafb;
        color: #111827;
      }
      .card {
        text-align: center;
        padding: 24px 16px 8px;
      }
      .card img {
        width: 96px;
        height: auto;
        margin-bottom: 16px;
      }
      .card h1 {
        font-size: clamp(1.25rem, 4vw, 1.75rem);
        
      }
      .card .subtitle {
        margin: 0;
        color: #6b7280;
        font-size: 1rem;
      }
      .sinconexion {
        text-align: center;
        padding: 16px;
        width: 100%;
        max-width: 600px;
      }
      .sinconexion img {
        width: min(500px, 90vw);
        height: auto;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/sinconexion.svg" alt="Icono sin señal WiFi"/>
      <h1>La señal se perdió. La aventura no.</h1>
      <p class="subtitle">El offline también tiene buena vista</p>
    </div>

    <div class="sinconexion">
      <img src="/sinconexioncarro.svg" alt="Coche en carretera sin conexión"/>
    </div>
  </body>
</html>
